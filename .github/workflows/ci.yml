name: CI

# Runs on every pull request (any target branch), on pushes to main, and on
# demand via the Actions tab ("Run workflow") or `gh workflow run ci.yml`.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Lint
        run: |
          uv run --group lint ruff check .
          uv run --group lint ruff format --check .
      - name: Type check
        run: uv run --group typing mypy langchain_engram
      - name: Import check
        run: uv run python scripts/check_imports.py
      - name: Unit tests
        run: uv run --group test pytest tests/unit_tests -v
